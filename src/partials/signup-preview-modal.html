    <div id="signup-preview-modal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close-modal" onclick="closeSignupPreview()">&times;</span>
            <h2 style="margin-bottom: 1.5rem;">회원가입 정보 확인</h2>
            
            <div id="signup-preview-warnings" style="display: none; margin-bottom: 1.5rem; padding: 1rem; border-radius: 6px; background: rgba(255, 85, 85, 0.1); border: 1px solid rgba(255, 85, 85, 0.3);"></div>
            
            <div style="background: var(--bg-tertiary); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 1.5rem;">
                <div style="margin-bottom: 1.2rem;">
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.4rem; text-transform: uppercase; font-weight: 600;">아이디</p>
                    <p style="font-size: 1.15rem; font-weight: 600; word-break: break-all;" id="preview-id"></p>
                </div>
                <div style="margin-bottom: 1.2rem;">
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.4rem; text-transform: uppercase; font-weight: 600;">기수</p>
                    <p style="font-size: 1.15rem; font-weight: 600;" id="preview-batch"></p>
                </div>
                <div>
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.4rem; text-transform: uppercase; font-weight: 600;">이름</p>
                    <p style="font-size: 1.15rem; font-weight: 600;" id="preview-name"></p>
                </div>
            </div>

            <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.6; background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 6px; border-left: 3px solid #8c9aff;">
                ⚠️ 위의 정보가 올바른지 꼼꼼히 확인해주세요.<br>
                회원가입 후 정보 변경은 관리자를 통해서만 가능합니다.
            </p>

            <div style="display: flex; gap: 1rem;">
                <button class="btn" style="flex: 1; background: #555; color: white;" onclick="closeSignupPreview()">◀ 수정하기</button>
                <button class="btn" style="flex: 1;" id="signup-preview-google-btn" onclick="proceedSignupWithGoogle()">Google로 계속 ▶</button>
                <button class="btn" style="flex: 1; display: none;" id="signup-preview-github-btn" onclick="proceedSignupWithGitHub()">GitHub로 계속 ▶</button>
            </div>
        </div>
    </div>
