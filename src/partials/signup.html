        <section id="signup" class="section">
            <div id="signup-form-box" class="form-card">
                <h2 style="text-align: center; margin-bottom: 2rem;">Sign Up</h2>
                <div class="form-group">
                    <label>아이디 입력</label>
                    <input type="text" id="signup-id" placeholder="예: gshs43_junyeong (실명 일치 여부 확인 용도)" required>
                </div>
                <div class="form-group">
                    <label>기수</label>
                    <input type="text" id="signup-batch" placeholder="예: 42기" required>
                </div>
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" id="signup-name" placeholder="실명 입력" required>
                </div>
                <div class="signup-consent-list">
                    <label class="signup-consent-item">
                        <input type="checkbox" id="signup-consent-1" class="signup-consent-checkbox">
                        <span class="signup-consent-text">
                            1. <a href="#" class="signup-consent-link" onclick="event.preventDefault(); navigateTo('/privacy');">개인정보 처리방침 및 법적 고지</a>에 관한 내용에 동의합니다.
                        </span>
                    </label>
                    <label class="signup-consent-item">
                        <input type="checkbox" id="signup-consent-2" class="signup-consent-checkbox">
                        <span class="signup-consent-text">
                            2. <a href="#" class="signup-consent-link" onclick="event.preventDefault(); navigateTo('/guidelines');">커뮤니티 이용 가이드라인</a>에 관한 내용에 동의하며, 이에 맞춰 건전하게 커뮤니티를 사용할 것을 다짐합니다.
                        </span>
                    </label>
                    <label class="signup-consent-item">
                        <input type="checkbox" id="signup-consent-3" class="signup-consent-checkbox">
                        <span class="signup-consent-text">3. 본인의 실명에 맞게 이름, 기수를 기재하였으며, 불시에 아이디와 이름 일치 여부를 확인할 수 있음을 인지하고 동의합니다.</span>
                    </label>
                </div>
                <button class="btn" style="width:100%; margin-bottom: 0.75rem; padding: 0.8rem 1rem;" onclick="handleSignupWithGoogle()">Google 계정으로 회원가입</button>
                <button class="btn" style="width:100%; margin-bottom: 0.75rem; padding: 0.8rem 1rem;" onclick="handleSignupWithGitHub()">GitHub 계정으로 회원가입</button>
                <div style="text-align: center; margin-top: 1rem; font-size: 0.95rem; color:var(--text-secondary);">
                    이미 계정을 만드셨나요? <a onclick="navigateTo('/login')" style="cursor:pointer; color:inherit; font-weight:700; text-decoration:underline;">로그인</a>
                </div>
            </div>
        </section>
