        <section id="notice" class="section">
            <h2 style="margin-bottom: 2rem;">Notice</h2>
            
            <div id="notice-write-box" class="admin-write">
                <h3 style="margin-bottom: 1rem;">새 공지사항 작성</h3>
                <input type="text" id="post-title" placeholder="제목">
                <select id="post-tag" required>
                    <option value="" disabled selected>태그를 선택하세요.</option>
                    <option value="학술 자료">학술 자료</option>
                    <option value="이벤트 안내">이벤트 안내</option>
                    <option value="설문 조사">설문 조사</option>
                    <option value="기타">기타</option>
                </select>
                <textarea id="post-content" placeholder="내용을 입력하세요... (최대 2000바이트 제한)"></textarea>

                <div id="file-upload-container" style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:var(--text-secondary); font-size:0.9rem;">파일 첨부 (명예부원은 첨부 불가 / 일일 업로드 제한 2MB)</label>
                    <input type="file" id="post-file" multiple style="padding: 0.5rem; background: transparent; border: 1px dashed var(--border-color); width: 100%;">
                </div>

                <button class="btn" onclick="addNotice()">게시하기</button>
            </div>

            <div class="tag-filter-bar">
                <button type="button" class="page-btn notice-tag-filter-btn active" data-tag="" onclick="changeNoticeTagFilter('')">전체</button>
                <button type="button" class="page-btn notice-tag-filter-btn" data-tag="학술 자료" onclick="changeNoticeTagFilter('학술 자료')">학술 자료</button>
                <button type="button" class="page-btn notice-tag-filter-btn" data-tag="이벤트 안내" onclick="changeNoticeTagFilter('이벤트 안내')">이벤트 안내</button>
                <button type="button" class="page-btn notice-tag-filter-btn" data-tag="설문 조사" onclick="changeNoticeTagFilter('설문 조사')">설문 조사</button>
                <button type="button" class="page-btn notice-tag-filter-btn" data-tag="기타" onclick="changeNoticeTagFilter('기타')">기타</button>
            </div>

            <table class="notice-table">
                <thead>
                    <tr>
                        <th id="th-pin-header" style="width: 8%; text-align: center; display: none;">고정</th>
                        <th style="width: 47%;">제목</th>
                        <th style="width: 25%;">작성자 (등급)</th>
                        <th style="width: 20%;">날짜</th>
                    </tr>
                </thead>
                <tbody id="notice-list"></tbody>
            </table>
            <div id="pagination-controls" class="pagination"></div>
        </section>
